statechart:
  name: StandardA3Extraction
  description: "Statechart for standard A3 extraction and processing pipeline."

  root state:
    name: standard_a3_extraction
    initial: undefined
    contract:
      - always: handler.system_checks_passed()

    states:
      - name: undefined
        description: "Initial state before any evaluation is done."
        transitions:
          - target: received
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.RECEIVED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.RECEIVED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.UNDEFINED, to_state = EtlProcessStatePort.RECEIVED)

      - name: received
        description: "The package contains a raw.txt file."
        transitions:
          - target: sanitized
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.SANITIZED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.SANITIZED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.RECEIVED, to_state = EtlProcessStatePort.SANITIZED)

      - name: sanitized
        description: "The package contains a sanitized.txt file after basic cleaning."
        transitions:
          - target: typed
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.TYPED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.TYPED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.SANITIZED, to_state = EtlProcessStatePort.TYPED)

      - name: typed
        description: "The execution context defines the shape used for parsing."
        transitions:
          - target: parsed
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.PARSED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.PARSED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.TYPED, to_state = EtlProcessStatePort.PARSED)

      - name: parsed
        description: "The package contains a parsed.json file generated by the LLM."
        transitions:
          - target: translated
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.TRANSLATED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.TRANSLATED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.PARSED, to_state = EtlProcessStatePort.TRANSLATED)

      - name: translated
        description: "The package contains a graph.ttl file resulting from JSON to TTL conversion."
        transitions:
          - target: validated
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.VALIDATED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.VALIDATED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.TRANSLATED, to_state = EtlProcessStatePort.VALIDATED)

      - name: validated
        description: "The package contains a validated.txt SHACL validation report."
        transitions:
          - target: reasoned
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.REASONED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.REASONED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.VALIDATED, to_state = EtlProcessStatePort.REASONED)

      - name: reasoned
        description: "The package contains a reasoned.ttl file after passing through a reasoner."
        transitions:
          - target: dispatched
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.DISPATCHED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.DISPATCHED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.REASONED, to_state = EtlProcessStatePort.DISPATCHED)

      - name: dispatched
        description: "The package contains an dispatched.jsonld file, persisted as an event."
        transitions:
          - target: federated
            guard: handler.can_transit_to(to_state = EtlProcessStatePort.FEDERATED)
            action: handler.perform_state_transition(to_state = EtlProcessStatePort.FEDERATED)
            contract:
              - after: handler.validate_state_transition(from_state = EtlProcessStatePort.DISPATCHED, to_state = EtlProcessStatePort.FEDERATED)

      - name: federated
        description: "The dataset contains a payload/documents/<hash>.jsonld file registered as an InternalDocument in index.ttl."
        type: final
